<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Control Demo - AI Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #gameCanvas {
            display: block;
            background: #87CEEB;
        }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        #fps-counter {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #instructions {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.6;
        }

        #instructions h3 {
            margin-bottom: 10px;
            color: #FFD700;
        }

        #instructions ul {
            list-style-position: inside;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-overlay">
        <div id="fps-counter">FPS: 0</div>
        <div id="instructions">
            <h3>Hand Control Demo</h3>
            <ul>
                <li><strong>Move Mouse:</strong> Active hand reaches toward cursor</li>
                <li><strong>Tab:</strong> Switch between left and right hand</li>
                <li><strong>Active hand:</strong> Highlighted in gold</li>
            </ul>
        </div>
    </div>

    <script type="module" src="hand-control-demo.js"></script>
</body>
</html>
